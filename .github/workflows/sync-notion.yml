name: Sync Notion

on:
  push:
    branches:
      - main
    paths:
      - docs/notion/Pico_Tama_Project.md
      - scripts/sync_notion_markdown.py
      - .github/workflows/sync-notion.yml
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Markdown to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: python3 scripts/sync_notion_markdown.py docs/notion/Pico_Tama_Project.md
